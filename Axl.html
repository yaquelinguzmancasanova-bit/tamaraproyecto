<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXL ROSE</title>
    <style>
        /* Aquí empieza el CSS para el diseño */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .btn-volver {
            align-self: flex-start;
            background-color: #ffcc00;
            color: black;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        .btn-volver:hover {
            background-color: #e6b800;
        }

        .card {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            text-align: center;
        }

        img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            border: 3px solid #ffcc00;
        }

        h1 {
            color: #ffcc00;
            margin-top: 20px;
        }

        p {
            line-height: 1.6;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-volver">← Volver</a>

    <div class="card">
        <img src="rose.jpg" alt="ROSE">
        
        <h1>Axl Rose</h1>
        
        <p>
Axl Rose (1962-actualidad), cantante, compositor y músico estadounidense.
</p>
<p>
Líder y vocalista de Guns N' Roses, banda de rock icónica.Conocido por su voz poderosa y personalidad enérgica en el escenario.
</p>
<p>
Hits: "Sweet Child O' Mine", "November Rain", "Paradise City".
        </p>
    </div>

</body>
</html>
